<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Study Resources</title>
  <link rel="icon" href="icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .card { height: 100%; transition: transform 0.2s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="container py-5">
    <header class="text-center mb-5">
      <h1 class="display-4 fw-bold text-primary">My Study Resources</h1>
      <p class="lead text-muted">Links will now open in a new tab!</p>
    </header>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
      
      <div class="col">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h2 class="h4 card-title border-bottom pb-2 mb-3 text-info">Math</h2>
            <div class="d-grid gap-2">
              <a href="https://www.khanacademy.org/math/arithmetic" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">Arithmetic</a>
              <a href="https://www.khanacademy.org/math/algebra-basics" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">Algebra Basics</a>
              <a href="https://www.khanacademy.org/math/basic-geo" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">Basic Geometry</a>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h2 class="h4 card-title border-bottom pb-2 mb-3 text-success">Science</h2>
            <div class="d-grid gap-2">
              <a href="https://www.khanacademy.org/science/hs-bio" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">Biology</a>
              <a href="https://www.khanacademy.org/science/hs-chemistry" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">Chemistry</a>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h2 class="h4 card-title border-bottom pb-2 mb-3 text-warning">Social Studies</h2>
            <div class="d-grid gap-2">
              <a href="https://www.khanacademy.org/humanities/us-history" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">US History</a>
              <a href="https://www.khanacademy.org/humanities/us-government-and-civics" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">US Government</a>
            </div>
          </div>
        </div>
      </div>

      <div class="col">
        <div class="card border-0 shadow-sm">
          <div class="card-body">
            <h2 class="h4 card-title border-bottom pb-2 mb-3 text-danger">ELA</h2>
            <div class="d-grid gap-2">
              <a href="https://www.khanacademy.org/ela/grammar" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">Grammar</a>
              <a href="https://readtheory.org/" target="_blank" rel="noopener noreferrer" class="btn btn-outline-dark btn-sm text-start">Reading Theory</a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
